# Fast regression check for Stooq/Yahoo benchmark URL shaping and CSV parsing (mocked fetch).
name: Stooq benchmarks

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run test:stooq-benchmarks
